name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Static HTML export with Nuxt
        run: npm run generate

      - name: List output files (Debug)
        run: |
          echo "Contenido de la carpeta app:"
          ls -a
          echo "---"
          echo "Buscando carpeta de salida (.output o dist):"
          if [ -d ".output" ]; then echo "Encontrada .output"; ls -R .output/public; fi
          if [ -d "dist" ]; then echo "Encontrada dist"; ls -R dist; fi

      - name: Static HTML export with Nuxt
        run: npm run generate

      - name: List output files (Debug)
        run: |
          echo "=== Contenido raíz de app ==="
          ls -la
          echo "=== Buscando TODAS las carpetas ==="
          find . -type d -maxdepth 3
          echo "=== package.json scripts ==="
          cat package.json | grep -A 10 '"scripts"'
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
